project:
  name: example-library
  type: oss
  domain: developer_tooling
  platforms:
    - node
    - cli

features:
  issue_intake_brief: true
  pr_decision_brief: true
  issue_reproduction_pr: false
  release_readiness_brief: false

agent:
  issue_reproduction_pr:
    trigger_label: maintainer-kit:repro
    trigger_comment: /maintainer-kit repro
    branch_prefix: maintainer-kit
    allowed_paths:
      - tests/**
      - test/**
      - __tests__/**
      - fixtures/**
      - docs/**
      - examples/**
    blocked_paths:
      - .github/**
      - .env
      - .env.*
      - package.json
      - pnpm-lock.yaml
      - package-lock.json
      - yarn.lock
    context_paths:
      - package.json
      - tsconfig.json
      - vitest.config.*
      - jest.config.*
      - tests/**
      - test/**
      - __tests__/**
      - fixtures/**
      - docs/**
      - examples/**
      - src/**
    max_files_changed: 3
    max_file_bytes: 20000
    max_total_bytes: 40000
    max_context_files: 40
    max_context_chars: 60000

behavior:
  comment_mode: update
  auto_label: false
  auto_close: false
  dry_run: false

model:
  provider: openai
  name: gpt-4.1-mini
  max_input_tokens: 12000

language:
  output: en

metrics:
  primary:
    - weekly_active_users
    - task_completion_rate
  secondary:
    - trial_conversion
    - report_export_rate

critical_flows:
  - install
  - configuration
  - cli_execution
  - api_compatibility

sensitive_areas:
  - breaking_change
  - security
  - performance
  - public_api
  - documentation

roles:
  maintainer:
    required_for:
      - breaking_change
      - public_api
      - release
  docs:
    required_for:
      - documentation
      - examples

privacy:
  max_diff_lines: 800
  max_diff_chars: 50000
  redact_secrets: true
  exclude_files:
    - package-lock.json
    - pnpm-lock.yaml
    - yarn.lock
    - "*.min.js"
    - "*.png"
    - "*.jpg"
    - "*.jpeg"
    - "*.gif"
    - "*.webp"
    - "*.pdf"
    - "*.zip"
