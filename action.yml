name: Maintainer Kit
description: Turn maintainer-approved GitHub work into actionable briefs and small draft PRs.
author: joj0hq

branding:
  icon: clipboard
  color: blue

inputs:
  github-token:
    description: GitHub token used to read context and optionally create guarded draft PRs.
    required: true
  openai-api-key:
    description: OpenAI API key used to generate briefs, reproductions, and focused CI fixes.
    required: true
  config-path:
    description: Path to the maintainer-kit config file.
    required: false
    default: .maintainer-kit.yml
  mode:
    description: "Execution mode. Supported values: suggest, dry-run."
    required: false
    default: suggest
  comment-mode:
    description: "Comment behavior. Supported values: create, update, none."
    required: false
    default: update
  model:
    description: Model name to use. If omitted, use config value.
    required: false
  output-language:
    description: "Language for generated brief comments. Supported values: en, ja."
    required: false

runs:
  using: node20
  main: dist/index.js
