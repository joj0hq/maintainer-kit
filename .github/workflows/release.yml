name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Version tag to publish, for example v0.1.0
        required: true
        type: string
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: false
        default: false
        type: boolean
      update_major_tag:
        description: Move the major tag, for example v0, to this release
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: release-${{ inputs.version || github.ref_name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Resolve release inputs
        id: release
        env:
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_PRERELEASE: ${{ inputs.prerelease }}
          INPUT_UPDATE_MAJOR_TAG: ${{ inputs.update_major_tag }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            VERSION="$GITHUB_REF_NAME"
            if [[ "$VERSION" == *-* ]]; then
              PRERELEASE=true
              UPDATE_MAJOR_TAG=false
            else
              PRERELEASE=false
              UPDATE_MAJOR_TAG=true
            fi
          else
            VERSION="$INPUT_VERSION"
            PRERELEASE="$INPUT_PRERELEASE"
            UPDATE_MAJOR_TAG="$INPUT_UPDATE_MAJOR_TAG"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "update_major_tag=$UPDATE_MAJOR_TAG" >> "$GITHUB_OUTPUT"
      - name: Validate version
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must look like v0.1.0 or v0.1.0-beta.1"
            exit 1
          fi

          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${VERSION#v}"
          if [[ "$PACKAGE_VERSION" != "$TAG_VERSION" ]]; then
            echo "package.json version ($PACKAGE_VERSION) must match release tag ($TAG_VERSION)"
            exit 1
          fi

          if gh release view "$VERSION" >/dev/null 2>&1; then
            echo "GitHub Release $VERSION already exists"
            exit 1
          fi

          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]] && git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists"
            exit 1
          fi

          if [[ "$GITHUB_EVENT_NAME" == "push" ]] && ! git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION must exist before creating a release from a tag push"
            exit 1
          fi
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm bundle
      - run: git diff --exit-code dist
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.release.outputs.version }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        run: |
          args=(release create "$VERSION" --title "$VERSION" --generate-notes)
          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            args+=(--verify-tag)
          else
            args+=(--target "$GITHUB_SHA")
          fi

          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh "${args[@]}"
      - name: Update major tag
        if: ${{ steps.release.outputs.update_major_tag == 'true' && steps.release.outputs.prerelease != 'true' }}
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          MAJOR_TAG="${VERSION%%.*}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$MAJOR_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$MAJOR_TAG" --force
