name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Resolve package release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v${VERSION}"

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "package.json version must be a stable semantic version, found: $VERSION"
            exit 1
          fi

          if ! grep -q "^## ${VERSION} - " CHANGELOG.md; then
            echo "CHANGELOG.md must contain a release section for ${VERSION}"
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "GitHub Release $TAG already exists. Nothing to publish."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"
      - if: ${{ steps.release.outputs.should_release == 'true' }}
        run: pnpm install --frozen-lockfile
      - if: ${{ steps.release.outputs.should_release == 'true' }}
        run: pnpm typecheck
      - if: ${{ steps.release.outputs.should_release == 'true' }}
        run: pnpm test
      - if: ${{ steps.release.outputs.should_release == 'true' }}
        run: pnpm lint
      - if: ${{ steps.release.outputs.should_release == 'true' }}
        run: pnpm bundle
      - if: ${{ steps.release.outputs.should_release == 'true' }}
        run: git diff --exit-code dist
      - name: Create GitHub Release
        if: ${{ steps.release.outputs.should_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          TAG_EXISTS: ${{ steps.release.outputs.tag_exists }}
        run: |
          args=(release create "$TAG" --title "$TAG" --generate-notes)
          if [[ "$TAG_EXISTS" == "true" ]]; then
            args+=(--verify-tag)
          else
            args+=(--target "$GITHUB_SHA")
          fi
          gh "${args[@]}"
      - name: Update compatibility tags
        if: ${{ steps.release.outputs.should_release == 'true' }}
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"
          MAJOR_TAG="v${MAJOR}"
          MINOR_TAG="v${MAJOR}.${MINOR}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$MAJOR_TAG" "$GITHUB_SHA"
          git tag -f "$MINOR_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$MAJOR_TAG" --force
          git push origin "refs/tags/$MINOR_TAG" --force
