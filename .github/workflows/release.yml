name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version tag to publish, for example v0.1.0
        required: true
        type: string
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: false
        default: false
        type: boolean
      update_major_tag:
        description: Move the major tag, for example v0, to this release
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Validate version
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must look like v0.1.0 or v0.1.0-beta.1"
            exit 1
          fi

          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${VERSION#v}"
          if [[ "$PACKAGE_VERSION" != "$TAG_VERSION" ]]; then
            echo "package.json version ($PACKAGE_VERSION) must match release tag ($TAG_VERSION)"
            exit 1
          fi

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists"
            exit 1
          fi
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm bundle
      - run: git diff --exit-code dist
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          args=(release create "$VERSION" --target "$GITHUB_SHA" --title "$VERSION" --generate-notes)
          if [[ "$PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}"
      - name: Update major tag
        if: ${{ inputs.update_major_tag && !inputs.prerelease }}
        env:
          VERSION: ${{ inputs.version }}
        run: |
          MAJOR_TAG="${VERSION%%.*}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$MAJOR_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$MAJOR_TAG" --force
