name: Release Label

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled, ready_for_review]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  release-label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: node scripts/check-release-label.mjs
        env:
          GH_TOKEN: ${{ github.token }}
