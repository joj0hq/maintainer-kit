name: Maintainer Kit Dogfood

on:
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  decision-brief:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY_AVAILABLE: ${{ secrets.OPENAI_API_KEY != '' }}
    steps:
      - uses: actions/checkout@v7

      - name: Skip when OPENAI_API_KEY is not configured
        if: ${{ env.OPENAI_API_KEY_AVAILABLE != 'true' }}
        run: |
          echo "OPENAI_API_KEY is not configured. Skipping maintainer-kit dogfood run."

      - name: Create maintainer brief
        if: ${{ env.OPENAI_API_KEY_AVAILABLE == 'true' }}
        uses: joj0hq/maintainer-kit@v0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          config-path: .maintainer-kit.yml
          mode: suggest
          comment-mode: update
