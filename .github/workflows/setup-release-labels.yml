name: Setup Release Labels

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Create or update release labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: scripts/apply-release-labels.sh
